kind = "web"
previewPath = "/clash/"
title = "Clash — AI Debate Arena"
version = "1.0.0"
id = "artifacts/clash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/clash/" ]
localPort = 20285

[services.development]
run = "pnpm --filter @workspace/clash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clash", "run", "build" ]
publicDir = "artifacts/clash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20285"
BASE_PATH = "/clash/"
