# Netlify proxies /api/* → Replit API server
# The SPA fallback must come last.

[[redirects]]
  from   = "/api/*"
  to     = "https://clash--ladytrissh.replit.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
