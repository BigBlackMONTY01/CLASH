# ─────────────────────────────────────────────────────────────────────
#  Netlify config for Clash frontend
#
#  The frontend calls /api/* endpoints. In production on Netlify,
#  those calls need to be proxied to your deployed API server.
#
#  HOW TO USE:
#  1. Deploy the API server (e.g. publish it on Replit)
#  2. Replace https://YOUR-API-SERVER.replit.app below with the real URL
#  3. Push this file — Netlify will proxy all /api/* requests automatically
# ─────────────────────────────────────────────────────────────────────

[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-API-SERVER.replit.app/api/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-From = "netlify-proxy"

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
