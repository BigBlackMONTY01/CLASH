  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#0a0a0a;}
    #splash{
      position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0a0a0a;z-index:9999;
      transition:opacity 0.4s ease, transform 0.4s ease;
    }
    #splash.out{opacity:0;transform:scale(1.04);pointer-events:none;}
    #splash-logo{
      font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:10px;color:#e63946;line-height:1;
      animation:splashPulse 1.6s ease-in-out infinite;
    }
    #splash-sub{
      font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:5px;color:#444;
      margin-top:10px;text-transform:uppercase;
      animation:splashFadeIn 0.8s ease 0.3s both;
    }
    #splash-bar-track{
      width:120px;height:2px;background:#1a1a1a;border-radius:2px;margin-top:32px;overflow:hidden;
      animation:splashFadeIn 0.6s ease 0.5s both;
    }
    #splash-bar{
      height:100%;background:#e63946;border-radius:2px;
      animation:splashLoad 1.4s cubic-bezier(0.4,0,0.2,1) 0.5s both;
    }
    @keyframes splashPulse{
      0%,100%{text-shadow:0 0 20px rgba(230,57,70,0.4);}
      50%{text-shadow:0 0 40px rgba(230,57,70,0.9);}
    }
    @keyframes splashFadeIn{
      from{opacity:0;transform:translateY(6px);}
      to{opacity:1;transform:none;}
    }
    @keyframes splashLoad{
      from{width:0;}
      to{width:100%;}
    }
  </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">CLASH</div>
      <div id="splash-sub">Argue. Win. Prove It.</div>
      <div id="splash-bar-track"><div id="splash-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
