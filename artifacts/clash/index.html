<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="description" content="CLASH is an AI-powered debate arena. Argue against 6 AI opponents, get scored on logic, persuasion and delivery, and climb the ranks." />

    <meta property="og:title" content="CLASH — Argue. Win. Prove It." />
    <meta property="og:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta property="og:type" content="website" />

    <meta property="og:image:type" content="image/jpeg" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CLASH" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="apple-touch-startup-image" href="/splash.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#0a0a0a;}
    #splash{
      position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0a0a0a;z-index:9999;
      transition:opacity 0.45s ease,transform 0.45s ease;
    }
    #splash.out{opacity:0;transform:scale(1.05);pointer-events:none;}
    #splash-word{
      display:flex;align-items:center;
      font-family:'Bebas Neue',Impact,sans-serif;
      font-size:82px;line-height:1;letter-spacing:6px;
    }
    #splash-cl{
      color:#fff;
      animation:fromLeft 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s both;
    }
    #splash-a{
      color:#e63946;
      text-shadow:0 0 40px rgba(230,57,70,0.7);
      animation:dropA 0.55s cubic-bezier(0.22,1,0.36,1) 0s both;
    }
    #splash-sh{
      color:#fff;
      animation:fromRight 0.5s cubic-bezier(0.22,1,0.36,1) 0.25s both;
    }
    #splash-sub{
      font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:5px;color:#444;
      margin-top:14px;text-transform:uppercase;
      animation:fadeUp 0.5s ease 0.85s both;
    }
    #splash-bar-track{
      width:100px;height:2px;background:#1a1a1a;border-radius:2px;margin-top:26px;overflow:hidden;
      animation:fadeUp 0.4s ease 0.75s both;
    }
    #splash-bar{
      height:100%;background:#e63946;border-radius:2px;
      animation:fillBar 1.1s cubic-bezier(0.4,0,0.2,1) 0.75s both;
    }
    @keyframes dropA{
      0%{transform:translateY(-110px);opacity:0;}
      65%{transform:translateY(10px);opacity:1;}
      100%{transform:translateY(0);opacity:1;}
    }
    @keyframes fromLeft{
      from{transform:translateX(-130px);opacity:0;}
      to{transform:translateX(0);opacity:1;}
    }
    @keyframes fromRight{
      from{transform:translateX(130px);opacity:0;}
      to{transform:translateX(0);opacity:1;}
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(8px);}
      to{opacity:1;transform:none;}
    }
    @keyframes fillBar{
      from{width:0;}
      to{width:100%;}
    }
  </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-word">
        <span id="splash-cl">CL</span>
        <span id="splash-a">A</span>
        <span id="splash-sh">SH</span>
      </div>
      <div id="splash-sub">Argue. Win. Prove It.</div>
      <div id="splash-bar-track"><div id="splash-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script><script>
  // Hide splash when React app fully loads
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('out');
      }
    }, 1200); // Let animations complete
  });
</script>
  </body>
</html>
