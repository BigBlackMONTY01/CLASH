<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CLASH — Argue. Win. Prove It.</title>
    <meta name="description" content="CLASH is an AI-powered debate arena. Argue against 6 AI opponents, get scored on logic, persuasion and delivery, and climb the ranks." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="CLASH — Argue. Win. Prove It." />
    <meta property="og:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CLASH — Argue. Win. Prove It." />
    <meta name="twitter:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CLASH" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="apple-touch-startup-image" href="/splash.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#0a0a0a;visibility:visible;}

    #pwa-splash{
      position:fixed;inset:0;z-index:99999;background:#0a0a0a;
      display:flex;align-items:center;justify-content:center;flex-direction:column;
      transition:opacity 0.5s ease;overflow:hidden;
    }
    #pwa-splash.out{opacity:0;pointer-events:none;}

    #splash-flash{
      position:absolute;inset:0;background:rgba(230,57,70,0.18);
      opacity:0;pointer-events:none;
      animation:flashPulse 0.3s ease-out 0.77s forwards;
    }

    #splash-row{
      display:flex;align-items:flex-end;
      font-family:'Bebas Neue',system-ui,sans-serif;
      font-size:80px;line-height:1;
      position:relative;z-index:1;
    }

    #splash-cl{
      color:#fff;letter-spacing:6px;
      display:inline-block;
      opacity:0;transform:translateX(-60px);
      animation:clIn 0.32s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    #splash-sh{
      color:#fff;letter-spacing:6px;
      display:inline-block;
      opacity:0;transform:translateX(60px);
      animation:shIn 0.32s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    #splash-a-wrap{
      position:relative;display:inline-block;line-height:1;
    }
    #splash-a{
      color:#e63946;letter-spacing:6px;
      display:inline-block;
      opacity:0;transform:translateY(-260px);
      animation:aDrop 0.2s cubic-bezier(0.4,0,1,1) 0.57s forwards,
                aSquish 0.3s ease-out 0.77s forwards;
    }

    .splash-wave{
      position:absolute;top:50%;left:50%;
      width:8px;height:8px;border-radius:50%;
      border:2px solid rgba(230,57,70,0.85);
      transform:translate(-50%,-50%) scale(0);
      opacity:0;
      animation:waveOut 0.55s ease-out 0.77s forwards;
    }
    .splash-wave-2{
      border-color:rgba(230,57,70,0.45);
      animation:waveOut 0.6s ease-out 0.87s forwards;
    }

    #splash-sub{
      font-family:'Barlow Condensed',system-ui,sans-serif;
      font-size:11px;letter-spacing:5px;text-transform:uppercase;
      color:rgba(255,255,255,0.25);
      margin-top:20px;
      opacity:0;
      animation:subIn 0.4s ease 0.98s forwards;
      position:relative;z-index:1;
    }

    @keyframes clIn{to{opacity:1;transform:translateX(0);}}
    @keyframes shIn{to{opacity:1;transform:translateX(0);}}
    @keyframes aDrop{
      0%{opacity:1;transform:translateY(-260px);}
      100%{opacity:1;transform:translateY(0);}
    }
    @keyframes aSquish{
      0%{transform:translateY(0) scaleY(1) scaleX(1);text-shadow:none;}
      20%{transform:translateY(0) scaleY(0.72) scaleX(1.18);text-shadow:0 0 40px rgba(230,57,70,1),0 0 80px rgba(230,57,70,0.5);}
      100%{transform:translateY(0) scaleY(1) scaleX(1);text-shadow:none;}
    }
    @keyframes waveOut{
      0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
      100%{transform:translate(-50%,-50%) scale(14);opacity:0;}
    }
    @keyframes flashPulse{
      0%{opacity:1;}
      100%{opacity:0;}
    }
    @keyframes subIn{to{opacity:1;}}
  </style>
  <script>
    (function(){
      var isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
      if(!isPWA){
        document.addEventListener('DOMContentLoaded', function(){
          var el = document.getElementById('pwa-splash');
          if(el) el.style.display = 'none';
        });
      }
    })();
  </script>
  </head>
  <body>
    <div id="pwa-splash">
      <div id="splash-flash"></div>
      <div id="splash-row">
        <span id="splash-cl">CL</span>
        <span id="splash-a-wrap">
          <span id="splash-a">A</span>
          <div class="splash-wave"></div>
          <div class="splash-wave splash-wave-2"></div>
        </span>
        <span id="splash-sh">SH</span>
      </div>
      <div id="splash-sub">Debate Arena</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
