<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="CLASH — Argue. Win. Prove It." />
    <meta property="og:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CLASH — Argue. Win. Prove It." />
    <meta name="twitter:description" content="Go head-to-head against 6 AI opponents. Get ranked S to F. Free to play, no signup." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CLASH" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="apple-touch-startup-image" href="/splash.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #0a0a0a; visibility: visible; }

      #pwa-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #0a0a0a;
        overflow: hidden;
        transition: opacity 0.5s ease;
      }
      #pwa-splash.out { opacity: 0; pointer-events: none; }

      #splash-flash {
        position: absolute; inset: 0;
        background: #fff;
        opacity: 0; pointer-events: none;
      }
      #splash-flash.fire {
        animation: flashBurst 0.45s ease-out forwards;
      }

      .arg-line {
        position: absolute;
        left: 50%;
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: clamp(13px, 3.8vw, 17px);
        font-weight: 600;
        letter-spacing: 0.5px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        opacity: 0;
        transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
      }

      #arg-top {
        top: calc(50% - 30px);
        color: rgba(255, 255, 255, 0.8);
        transform: translateX(calc(-50% - 72vw));
      }
      #arg-top.in {
        opacity: 1;
        transform: translateX(-50%);
      }
      #arg-top.collide {
        transform: translateX(-50%) translateY(6px);
        opacity: 0;
        transition: transform 0.28s ease-in, opacity 0.28s ease-in;
      }

      #arg-bot {
        top: calc(50% + 10px);
        color: rgba(230, 57, 70, 0.9);
        transform: translateX(calc(-50% + 72vw));
      }
      #arg-bot.in {
        opacity: 1;
        transform: translateX(-50%);
      }
      #arg-bot.collide {
        transform: translateX(-50%) translateY(-4px);
        opacity: 0;
        transition: transform 0.28s ease-in, opacity 0.28s ease-in;
      }

      .arg-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background: currentColor;
        margin-left: 3px;
        flex-shrink: 0;
        animation: cursorBlink 0.55s step-end infinite;
      }

      #clash-logo {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.55);
        font-family: 'Bebas Neue', system-ui, sans-serif;
        font-size: clamp(68px, 20vw, 96px);
        letter-spacing: 8px;
        color: #fff;
        line-height: 1;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.22s ease, transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #clash-logo span { color: #e63946; }
      #clash-logo.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      #splash-sub {
        position: absolute;
        top: calc(50% + clamp(44px, 14vw, 68px));
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Barlow Condensed', system-ui, sans-serif;
        font-size: 11px; letter-spacing: 5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.2);
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #splash-sub.show { opacity: 1; }

      @keyframes cursorBlink { 50% { opacity: 0; } }
      @keyframes flashBurst {
        0%   { opacity: 0.38; }
        100% { opacity: 0; }
      }
    </style>
    <script>
      (function () {
        var isPWA = window.matchMedia('(display-mode: standalone)').matches
          || navigator.standalone === true;

        if (!isPWA) {
          document.addEventListener('DOMContentLoaded', function () {
            var el = document.getElementById('pwa-splash');
            if (el) el.style.display = 'none';
          });
          return;
        }

        document.addEventListener('DOMContentLoaded', function () {
          var TOP_STR  = '\u201cFacts don\u2019t care about feelings.\u201d';
          var BOT_STR  = '\u201cFeelings ARE evidence.\u201d';
          var SPEED_MS = 14;

          var topLine  = document.getElementById('arg-top');
          var botLine  = document.getElementById('arg-bot');
          var topText  = document.getElementById('arg-top-text');
          var botText  = document.getElementById('arg-bot-text');
          var cursorT  = document.getElementById('cursor-top');
          var cursorB  = document.getElementById('cursor-bot');
          var flash    = document.getElementById('splash-flash');
          var logo     = document.getElementById('clash-logo');
          var w1       = document.getElementById('w1');
          var w2       = document.getElementById('w2');
          var sub      = document.getElementById('splash-sub');

          var leftDone = false, rightDone = false;

          function typeText(el, str, onDone) {
            var i = 0;
            function step() {
              if (i < str.length) {
                el.textContent += str[i++];
                setTimeout(step, SPEED_MS + Math.random() * 8);
              } else {
                if (onDone) onDone();
              }
            }
            step();
          }

          function onBothDone() {
            if (!leftDone || !rightDone) return;
            cursorT.style.display = 'none';
            cursorB.style.display = 'none';

            setTimeout(function () {
              topLine.classList.add('collide');
              botLine.classList.add('collide');

              setTimeout(function () {
                flash.classList.add('fire');

                setTimeout(function () {
                  logo.classList.add('show');
                  w1.classList.add('fire');
                  setTimeout(function () { w2.classList.add('fire'); }, 120);
                  setTimeout(function () { sub.classList.add('show'); }, 320);
                  setTimeout(function () {
                    var splashEl = document.getElementById('pwa-splash');
                    if (splashEl) {
                      splashEl.classList.add('out');
                      setTimeout(function () { if (splashEl) splashEl.style.display = 'none'; }, 520);
                    }
                  }, 900);
                }, 80);
              }, 180);
            }, 280);
          }

          setTimeout(function () {
            topLine.classList.add('in');
            botLine.classList.add('in');
          }, 80);

          setTimeout(function () {
            typeText(topText, TOP_STR, function () { leftDone = true; onBothDone(); });
            typeText(botText, BOT_STR, function () { rightDone = true; onBothDone(); });
          }, 160);
        });
      })();
    </script>
  </head>
  <body>
    <div id="pwa-splash">
      <div id="splash-flash"></div>
      <div class="arg-line" id="arg-top">
        <span id="arg-top-text"></span><span class="arg-cursor" id="cursor-top"></span>
      </div>
      <div class="arg-line" id="arg-bot">
        <span id="arg-bot-text"></span><span class="arg-cursor" id="cursor-bot"></span>
      </div>
      <div id="clash-logo">CL<span>A</span>SH</div>
      <div class="s-wave" id="w1"></div>
      <div class="s-wave" id="w2"></div>
      <div id="splash-sub">Debate Arena</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
