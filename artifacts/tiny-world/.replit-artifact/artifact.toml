kind = "web"
previewPath = "/tiny-world/"
title = "Tiny World Simulator"
version = "1.0.0"
id = "artifacts/tiny-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tiny-world/" ]
localPort = 24576

[services.development]
run = "pnpm --filter @workspace/tiny-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiny-world", "run", "build" ]
publicDir = "artifacts/tiny-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24576"
BASE_PATH = "/tiny-world/"
