kind = "web"
previewPath = "/"
title = "LectureFlow Studio"
version = "1.0.0"
id = "artifacts/lecture-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23048

[services.development]
run = "pnpm --filter @workspace/lecture-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lecture-flow", "run", "build" ]
publicDir = "artifacts/lecture-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23048"
BASE_PATH = "/"
