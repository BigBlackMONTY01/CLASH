services:
  - type: web
    name: clash
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RENDER
        value: true
      - key: FRONTEND_DIST
        value: artifacts/clash/dist/public
      - key: JWT_SECRET
        generateValue: true
      - key: NEON_DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
