# ─────────────────────────────────────────────────────────────────
# Option A: Deploy the full React build (recommended)
#   1. Connect your GitHub repo to Netlify
#   2. Netlify will auto-detect these build settings
# ─────────────────────────────────────────────────────────────────
[build]
  command   = "pnpm --filter @workspace/clash run build"
  publish   = "artifacts/clash/dist/public"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes (/, /play, etc.) serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─────────────────────────────────────────────────────────────────
# Option B: Deploy just landing.html as a static page
#   1. Upload landing.html + og-image.png to Netlify Drop
#   2. No build config needed — ignore this file
# ─────────────────────────────────────────────────────────────────
