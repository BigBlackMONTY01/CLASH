[build]
  command   = "pnpm --filter @workspace/clash run build"
  publish   = "artifacts/clash/dist/public"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the Replit backend — server-side, no CORS needed
[[redirects]]
  from   = "/api/*"
  to     = "https://clash--monteirofwadnan.replit.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — all non-API routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
